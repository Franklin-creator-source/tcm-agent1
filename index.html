<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>中医知识问答</title>
<style>
/* ... 保留原有所有样式 ... */

/* 新增：功能按钮样式 */
.action-buttons {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    justify-content: flex-end;
    background: #F5F0EB;
    border-bottom: 1px solid #E8D5C4;
}

.action-btn {
    padding: 5px 12px;
    border: 1px solid #C4A882;
    border-radius: 14px;
    font-size: 12px;
    color: #6B4C3B;
    background: #FFF;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 4px;
}

.action-btn:hover {
    background: #8B4513;
    color: #fff;
    border-color: #8B4513;
}

.action-btn:active {
    transform: scale(0.95);
}
</style>
</head>
<body>

<div class="header">
  <h1>🌿 中医知识问答</h1>
  <div class="sub">AI 辅助回答 · 仅供学术交流</div>
</div>

<div class="disclaimer">
  ⚠️ 所有回答仅供学术交流，不构成医疗建议。身体不适请及时到医院就医。
  <span id="langIndicator" style="margin-left: 8px; color: #C0392B; font-weight: bold;">简体中文</span>
</div>

<!-- 新增：功能按钮区域 -->
<div class="action-buttons">
  <button class="action-btn" id="clearBtn">🗑️ 清除对话</button>
  <button class="action-btn" id="langToggleBtn">🌐 中/EN</button>
</div>

<!-- 聊天区域和后续代码保持不变 ... -->

<script>
const chatArea = document.getElementById("chatArea");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const quickRow = document.getElementById("quickRow");
const clearBtn = document.getElementById("clearBtn");
const langToggleBtn = document.getElementById("langToggleBtn");
const langIndicator = document.getElementById("langIndicator");

let isAsking = false;
let currentLang = "zh"; // "zh" 或 "en"

// 添加消息
function addMessage(text, type, sources) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  let html = text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  if (type === "bot") {
    let srcHtml = "";
    if (sources && sources.length > 0) {
      const tags = sources.filter(s => s.title).slice(0, 5).map(s => `<span class="tag">📄 ${s.title}</span>`).join("");
      if (tags) srcHtml = `<div class="sources">相关文献：${tags}</div>`;
    }
    html += srcHtml;
    if (!text.includes("⚠️")) {
      html += `<div class="disclaimer-text">⚠️ 本回复仅供学术交流，不构成医疗建议，身体不适请及时就医。</div>`;
    }
  }
  div.innerHTML = html;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// 显示思考中
function showThinking() {
  const d = document.createElement("div");
  d.className = "thinking";
  d.id = "thinkingMsg";
  d.innerHTML = `<span style="font-size:13px">AI 思考中</span> <span class="dots"><span></span><span></span><span></span></span>`;
  chatArea.appendChild(d);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideThinking() {
  const t = document.getElementById("thinkingMsg");
  if (t) t.remove();
}

// 发送问题
async function ask(question) {
  if (!question.trim() || isAsking) return;
  isAsking = true;
  sendBtn.disabled = true;
  input.disabled = true;

  addMessage(question, "user");
  showThinking();

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ 
        question: question.trim(),
        lang: currentLang  // 发送当前语言设置
      })
    });
    const data = await resp.json();
    hideThinking();
    addMessage(data.answer || data.error || "暂无回答", "bot", data.sources || []);
  } catch(e) {
    hideThinking();
    addMessage("网络错误，请稍后重试", "bot");
  }

  isAsking = false;
  sendBtn.disabled = false;
  input.disabled = false;
  input.focus();
}

// ====== 新增功能 1：清除对话记录 ======
clearBtn.addEventListener("click", function() {
  // 保留第一条欢迎消息
  while (chatArea.children.length > 1) {
    chatArea.removeChild(chatArea.lastChild);
  }
  // 可选：显示提示消息
  addMessage("✅ 对话记录已清除", "bot");
});

// ====== 新增功能 2：中英文切换 ======
function updateLangUI(lang) {
  if (lang === "en") {
    langIndicator.textContent = "English";
    document.querySelector(".header h1").textContent = "🌿 TCM Q&A";
    document.querySelector(".header .sub").textContent = "AI Assistant · For Academic Purposes Only";
    document.querySelector(".disclaimer").innerHTML = `
      ⚠️ All responses are for academic discussion only. 
      Not medical advice. If unwell, please consult a doctor.
      <span id="langIndicator" style="margin-left: 8px; font-weight: bold;">English</span>
    `;
    input.placeholder = "Ask a TCM question...";
    sendBtn.title = "Send";
    
    // 更新快捷按钮文字
    document.querySelectorAll(".quick-btn").forEach(btn => {
      const data = btn.dataset.q;
      if (data === "伤寒论") btn.innerHTML = "📖 Shanghan Lun";
      else if (data === "六经辨证") btn.innerHTML = "📖 Six Meridians";
      else if (data === "李可") btn.innerHTML = "👨‍⚕️ Li Ke";
      else if (data === "郑钦安") btn.innerHTML = "🔥 Zheng Qin'an";
      else if (data === "张景岳") btn.innerHTML = "📚 Zhang Jingyue";
      else if (data === "祝味菊") btn.innerHTML = "🌿 Zhu Weiju";
    });
  } else {
    langIndicator.textContent = "简体中文";
    document.querySelector(".header h1").textContent = "🌿 中医知识问答";
    document.querySelector(".header .sub").textContent = "AI 辅助回答 · 仅供学术交流";
    document.querySelector(".disclaimer").innerHTML = `
      ⚠️ 所有回答仅供学术交流，不构成医疗建议。身体不适请及时到医院就医。
      <span id="langIndicator" style="margin-left: 8px; font-weight: bold;">简体中文</span>
    `;
    input.placeholder = "输入中医问题...";
    sendBtn.title = "发送";
    
    // 恢复快捷按钮文字
    document.querySelectorAll(".quick-btn").forEach(btn => {
      const data = btn.dataset.q;
      if (data === "伤寒论") btn.innerHTML = "📖 伤寒论";
      else if (data === "六经辨证") btn.innerHTML = "📖 六经辨证";
      else if (data === "李可") btn.innerHTML = "👨‍⚕️ 李可";
      else if (data === "郑钦安") btn.innerHTML = "🔥 郑钦安";
      else if (data === "张景岳") btn.innerHTML = "📚 张景岳";
      else if (data === "祝味菊") btn.innerHTML = "🌿 祝味菊";
    });
  }
}

langToggleBtn.addEventListener("click", function() {
  currentLang = currentLang === "zh" ? "en" : "zh";
  updateLangUI(currentLang);
});

// 事件绑定
sendBtn.addEventListener("click", () => { ask(input.value); input.value = ""; });
input.addEventListener("keydown", e => {
  if (e.key === "Enter") { ask(input.value); input.value = ""; }
});
input.addEventListener("input", () => {
  sendBtn.disabled = !input.value.trim() || isAsking;
});

quickRow.addEventListener("click", e => {
  const btn = e.target.closest(".quick-btn");
  if (btn) ask(btn.dataset.q);
});
</script>
</body>
</html>
