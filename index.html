<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中医知识问答</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        #header { background: #2c3e50; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        #header h1 { font-size: 20px; }
        #controls { display: flex; gap: 10px; }
        #controls button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        #langToggleBtn { background: #3498db; color: white; }
        #clearBtn { background: #e74c3c; color: white; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; background: #ecf0f1; }
        .msg { margin-bottom: 16px; padding: 12px 16px; border-radius: 12px; max-width: 80%; word-wrap: break-word; line-height: 1.6; }
        .user { background: #3498db; color: white; align-self: flex-end; margin-left: auto; }
        .bot { background: white; color: #333; border: 1px solid #ddd; }
        .msg .sources { margin-top: 8px; font-size: 13px; color: #7f8c8d; }
        .msg .disclaimer { margin-top: 10px; font-size: 12px; color: #bdc3c7; border-top: 1px solid #eee; padding-top: 6px; }
        #inputArea { display: flex; gap: 10px; padding: 16px 24px; background: white; border-top: 1px solid #ddd; }
        #inputArea input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; }
        #inputArea button { padding: 12px 24px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        #inputArea button:disabled { background: #95a5a6; cursor: not-allowed; }
        #loading { display: none; text-align: center; color: #7f8c8d; padding: 10px; }
    </style>
</head>
<body>
    <div id="header">
        <h1 id="title">🧧 中医知识问答</h1>
        <div id="controls">
            <button id="langToggleBtn">English</button>
            <button id="clearBtn">清空对话</button>
        </div>
    </div>
    <div id="chat"></div>
    <div id="loading">思考中...</div>
    <div id="inputArea">
        <input id="questionInput" type="text" placeholder="请输入您的中医问题..." autofocus />
        <button id="sendBtn">发送</button>
    </div>

    <script>
        // ---------- 状态 ----------
        let conversationHistory = [];
        let currentLang = "zh";
        const chatDiv = document.getElementById("chat");
        const loadingDiv = document.getElementById("loading");
        const input = document.getElementById("questionInput");
        const sendBtn = document.getElementById("sendBtn");
        const langToggleBtn = document.getElementById("langToggleBtn");
        const clearBtn = document.getElementById("clearBtn");

        // ---------- 工具函数 ----------
        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function saveHistory() {
            try {
                localStorage.setItem("conversationHistory", JSON.stringify(conversationHistory));
            } catch(e) {}
        }

        function loadHistory() {
            try {
                const saved = localStorage.getItem("conversationHistory");
                if (saved) {
                    conversationHistory = JSON.parse(saved);
                    conversationHistory.forEach(msg => {
                        addMessage(msg.content, msg.role, msg.sources || []);
                    });
                }
            } catch(e) {}
        }

        // ---------- 添加消息到界面（最终修正：先转义，后处理 Markdown） ----------
        function addMessage(text, type, sources = []) {
            const div = document.createElement("div");
            div.className = `msg ${type}`;

            // ① 先转义 HTML，防止 XSS
            let safeText = escapeHtml(text);
            // ② 再处理 Markdown 语法（加粗）
            safeText = safeText.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
            // ③ 处理换行
            safeText = safeText.replace(/\n/g, "<br />");
            div.innerHTML = safeText;

            if (sources && sources.length > 0) {
                const srcDiv = document.createElement("div");
                srcDiv.className = "sources";
                srcDiv.innerHTML = (currentLang === "zh" ? "📚 来源：" : "📚 Sources: ") +
                    sources.map(s => escapeHtml(s.title || "未知")).join("、");
                div.appendChild(srcDiv);
            }

            const disclaimers = [
                "本回答仅供学术交流，不构成医疗建议",
                "This response is for academic exchange only and does not constitute medical advice"
            ];
            const hasDisclaimer = disclaimers.some(d => text.includes(d));
            if (!hasDisclaimer && type === "bot") {
                const discDiv = document.createElement("div");
                discDiv.className = "disclaimer";
                discDiv.textContent = currentLang === "zh"
                    ? "⚠️ 本回答仅供学术交流，不构成医疗建议。如有不适，请及时就医。"
                    : "⚠️ This response is for academic exchange only. Consult a doctor if you feel unwell.";
                div.appendChild(discDiv);
            }

            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // ---------- 发送请求（带防重复提交） ----------
        async function ask() {
            if (sendBtn.disabled) return; // 已在请求中
            const question = input.value.trim();
            if (!question) return;

            addMessage(question, "user");
            conversationHistory.push({ role: "user", content: question });
            saveHistory();

            input.value = "";
            loadingDiv.style.display = "block";
            sendBtn.disabled = true;

            try {
                const resp = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        question: question,
                        history: conversationHistory.map(m => ({ role: m.role, content: m.content })),
                        lang: currentLang
                    })
                });
                const data = await resp.json();
                const answer = data.answer || "（没有获得回答）";
                const sources = data.sources || [];

                addMessage(answer, "bot", sources);
                conversationHistory.push({ role: "assistant", content: answer, sources: sources });
                saveHistory();
            } catch (err) {
                addMessage("网络错误，请稍后重试。", "bot");
            } finally {
                loadingDiv.style.display = "none";
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // ---------- 语言切换 ----------
        function toggleLang() {
            currentLang = (currentLang === "zh") ? "en" : "zh";
            const isZh = currentLang === "zh";
            document.getElementById("title").textContent = isZh ? "🧧 中医知识问答" : "🧧 TCM Q&A";
            langToggleBtn.textContent = isZh ? "English" : "中文";
            input.placeholder = isZh ? "请输入您的中医问题..." : "Ask a TCM question...";
            clearBtn.textContent = isZh ? "清空对话" : "Clear";
            loadingDiv.textContent = isZh ? "思考中..." : "Thinking...";
        }

        // ---------- 清空对话 ----------
        function clearChat() {
            chatDiv.innerHTML = "";
            conversationHistory = [];
            localStorage.removeItem("conversationHistory");
            input.value = "";
            input.focus();
        }

        // ---------- 事件绑定 ----------
        sendBtn.addEventListener("click", ask);
        input.addEventListener("keydown", (e) => { if (e.key === "Enter") ask(); });
        langToggleBtn.addEventListener("click", toggleLang);
        clearBtn.addEventListener("click", clearChat);

        // ---------- 初始化 ----------
        window.addEventListener("load", () => {
            loadHistory();
            input.focus();
        });
    </script>
</body>
</html>
